# ===================================
# Banking System - 通用配置
# ===================================
# 使用方法:
# 本地开发: --spring.profiles.active=local 或设置环境变量 SPRING_PROFILES_ACTIVE=local
# 生产环境: --spring.profiles.active=prod 或设置环境变量 SPRING_PROFILES_ACTIVE=prod
# ===================================

spring:
  application:
    name: banking

  profiles:
    active: local

  # ===================================
  # 数据源配置 (通过profile加载具体配置)
  # ===================================
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===================================
  # JPA / Hibernate 配置
  # ===================================
  jpa:
    hibernate:
      # 本地环境使用update，生产环境建议使用validate
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# ===================================
# 服务器配置
# ===================================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  # 生产环境优雅关闭
  shutdown: graceful

# ===================================
# JWT 配置
# ===================================
jwt:
  # 必须通过环境变量 JWT_SECRET 提供，缺失时应用启动失败（fail fast，避免误用弱默认值）
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# ===================================
# 日志配置
# ===================================
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.banking: ${LOG_LEVEL_APP:INFO}
    org.springframework.web: INFO
    org.hibernate.SQL: ${LOG_LEVEL_SQL:INFO}

# ===================================
# AWS SQS 配置
# ===================================
aws:
  region: ${AWS_REGION:ap-southeast-2}
  sqs:
    enabled: ${AWS_SQS_ENABLED:false}
    fail-on-error: ${AWS_SQS_FAIL_ON_ERROR:false}
    credit-queue-url: ${AWS_SQS_CREDIT_QUEUE_URL:}
    endpoint: ${AWS_SQS_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    message-group-id: ${AWS_SQS_MESSAGE_GROUP_ID:banking-credit-events}

# ===================================
# 月度报告配置
# ===================================
report:
  monthly:
    output-dir: ${MONTHLY_REPORT_OUTPUT_DIR:./build/reports/monthly}

# ===================================
# 内部接口鉴权（供 Lambda 调用 /api/internal/** ，不走用户 JWT）
# ===================================
internal:
  # 必须通过环境变量提供；留空则 InternalApiKeyFilter 直接拒绝所有请求（fail closed）
  api-key: ${INTERNAL_API_KEY:}

# ===================================
# OpenAI 交易描述推荐（可选功能，未配置 key 时自动走规则兜底）
# ===================================
openai:
  enabled: ${OPENAI_ENABLED:false}
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

# ===================================
# Actuator（健康检查默认放开，其余端点按 profile 收紧）
# ===================================
management:
  endpoints:
    web:
      exposure:
        include: health