# ===================================
# 生产环境配置 (EC2)
# ===================================
# 使用方法:
# 1. 命令行: java -jar banking.jar --spring.profiles.active=prod
# 2. 环境变量: export SPRING_PROFILES_ACTIVE=prod
# 3. 系统属性: -Dspring.profiles.active=prod
# ===================================

spring:
  # ===================================
  # 生产数据库配置 (AWS RDS)
  # ===================================
  datasource:
    # 使用环境变量配置数据库连接信息，不要硬编码到配置文件中！
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://your-rds-endpoint.region.rds.amazonaws.com:5432/banking_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    
    # 生产环境连接池配置
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 连接测试
      connection-test-query: SELECT 1

  # ===================================
  # JPA配置
  # ===================================
  jpa:
    hibernate:
      # 通过环境变量控制，首次部署可用 update 自动建表，稳定后可切换为 validate
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    # 生产环境不显示SQL
    show-sql: false
    properties:
      hibernate:
        # 生产环境关闭SQL格式化
        format_sql: false
        # 当前未接入 RegionFactory（如 Ehcache/Redis），先关闭二级缓存避免启动失败
        cache:
          use_second_level_cache: false
          use_query_cache: false

# ===================================
# 生产服务器配置
# ===================================
server:
  port: ${SERVER_PORT:8080}
  # 生产环境优雅关闭配置
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ===================================
# JWT配置 - 生产环境
# ===================================
jwt:
  # 生产环境必须使用环境变量设置！不要使用默认值！
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

# ===================================
# CORS 配置 - 生产环境
# ===================================
app:
  cors:
    # 逗号分隔的实际前端域名，例如 https://banking.example.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===================================
# 日志配置 - 生产环境
# ===================================
logging:
  level:
    root: WARN
    com.banking: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/banking/application.log
    max-size: 10MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ===================================
# 管理端点配置 (Spring Boot Actuator)
# ===================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  # CloudWatch 自定义 metrics 导出（生产环境才推送，本地/测试不需要）
  # 注意：Spring Boot 3.x 的属性前缀是 management.cloudwatch.metrics.export.*，
  # 不是 management.metrics.export.cloudwatch.*（后者对大多数其它 registry 适用，
  # CloudWatch2 registry 是个例外）——第一次上线验证时踩过这个坑，指标一直没有出现在
  # CloudWatch 里，最后靠对照 Spring Boot 官方属性文档才发现前缀写错了。
  cloudwatch:
    metrics:
      export:
        namespace: BankingSystem
        batch-size: 20
        step: 1m
        enabled: ${CLOUDWATCH_METRICS_ENABLED:false}

# ===================================
# 生产环境部署说明
# ===================================
# 在 EC2 上设置环境变量:
#
# export SPRING_PROFILES_ACTIVE=prod
# export SPRING_DATASOURCE_URL=jdbc:postgresql://your-rds-endpoint.region.rds.amazonaws.com:5432/banking_db
# export SPRING_DATASOURCE_USERNAME=postgres
# export SPRING_DATASOURCE_PASSWORD=your_secure_password
# export JWT_SECRET=your_secure_jwt_secret_key
# export SERVER_PORT=8080
#
# 启动应用:
# java -jar banking-0.0.1-SNAPSHOT.jar
# ===================================

