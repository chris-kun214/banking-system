spring:
  application:
    name: banking-test
  
  # 测试数据源配置 - 使用H2内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  # H2控制台
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # JPA配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # 安全配置
  security:
    user:
      name: test
      password: test

# JWT配置（测试环境）
jwt:
  secret: test-secret-key-for-jwt-token-generation-banking-app-testing-only
  expiration: 3600000  # 1小时（毫秒）

# 日志配置
logging:
  level:
    root: INFO
    com.banking: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
